<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha Cadastral – Escolinha Girassol</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; }
    .brand-header {
      background: linear-gradient(180deg, #FDD71E 0%, #FAD01C 50%, #EFC515 100%);
      color: #212529; padding: 2rem 0; text-align: center;
    }
    .brand-header img { width: 60px; height: 60px; border-radius: 50%; margin-bottom: .5rem; }
    .brand-header h1 { font-size: 1.6rem; margin: 0; }
    .brand-header p { opacity: .85; margin: 0; font-size: .9rem; }
    .form-card { border: 0; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); margin-top: -1.5rem; }
    .form-card .card-header {
      background: transparent; border-bottom: 2px solid #e9ecef;
      font-weight: 600; font-size: 1.1rem; padding: 1rem 1.25rem;
    }
    .form-label { font-weight: 500; font-size: .9rem; }
    .required::after { content: ' *'; color: #dc3545; }
    .honey { position: absolute; left: -9999px; opacity: 0; height: 0; overflow: hidden; }
    .submit-section { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 1.5rem; text-align: center; }
    .footer-text { font-size: .8rem; color: #6c757d; text-align: center; margin-top: 2rem; padding-bottom: 2rem; }
    @media (max-width: 576px) { .brand-header { padding: 1.5rem 0; } .brand-header h1 { font-size: 1.3rem; } }
  </style>
</head>
<body>

  <div class="brand-header">
    <img src="images/Gira.jpg" alt="Logo">
    <h1>Escolinha Girassol</h1>
    <p>Ficha Cadastral do Aluno</p>
  </div>

  <div class="container" style="max-width:800px">
    <form id="fichaForm" novalidate>

      <!-- Dados do Aluno -->
      <div class="card form-card mb-4">
        <div class="card-header">Dados do Aluno</div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-8 mb-3">
              <label for="nome" class="form-label required">Nome Completo</label>
              <input type="text" class="form-control" id="nome" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="data_nascimento" class="form-label required">Data de Nascimento</label>
              <input type="date" class="form-control" id="data_nascimento" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="cpf_aluno" class="form-label">CPF do Aluno</label>
              <input type="text" class="form-control" id="cpf_aluno" placeholder="000.000.000-00">
            </div>
            <div class="col-md-4 mb-3">
              <label for="genero" class="form-label">Gênero</label>
              <select class="form-select" id="genero">
                <option value="">Selecione...</option>
                <option value="Masculino">Masculino</option>
                <option value="Feminino">Feminino</option>
                <option value="Outro">Outro</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="turma" class="form-label">Turma</label>
              <select class="form-select" id="turma">
                <option value="">Selecione...</option>
                <option value="1">Maternal I</option>
                <option value="2">Maternal II</option>
                <option value="3">Jardim I</option>
                <option value="4">Jardim II</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="turno" class="form-label">Turno</label>
              <select class="form-select" id="turno">
                <option value="">Selecione...</option>
                <option value="Manhã">Manhã</option>
                <option value="Tarde">Tarde</option>
                <option value="Integral">Integral</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label for="foto" class="form-label">Foto do Aluno</label>
            <input type="file" class="form-control" id="foto" accept="image/jpeg,image/png,image/webp" capture="environment">
          </div>
          <div class="mb-3">
            <label for="documento" class="form-label">Foto da Certidão de Nascimento</label>
            <input type="file" class="form-control" id="documento" accept="image/jpeg,image/png,image/webp" capture="environment">
          </div>
        </div>
      </div>

      <!-- Endereço -->
      <div class="card form-card mb-4">
        <div class="card-header">Endereço</div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="endereco_rua" class="form-label">Rua</label>
              <input type="text" class="form-control" id="endereco_rua">
            </div>
            <div class="col-md-3 mb-3">
              <label for="endereco_bairro" class="form-label">Bairro</label>
              <input type="text" class="form-control" id="endereco_bairro">
            </div>
            <div class="col-md-3 mb-3">
              <label for="endereco_cidade" class="form-label">Cidade</label>
              <input type="text" class="form-control" id="endereco_cidade">
            </div>
          </div>
        </div>
      </div>

      <!-- Responsáveis -->
      <div class="card form-card mb-4">
        <div class="card-header">Responsáveis</div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="nome_pai" class="form-label">Nome do Pai</label>
              <input type="text" class="form-control" id="nome_pai">
            </div>
            <div class="col-md-3 mb-3">
              <label for="contato_pai" class="form-label">Contato do Pai</label>
              <input type="text" class="form-control" id="contato_pai" placeholder="Telefone / WhatsApp">
            </div>
            <div class="col-md-3 mb-3">
              <label for="cpf_pai" class="form-label">CPF do Pai</label>
              <input type="text" class="form-control" id="cpf_pai" placeholder="000.000.000-00">
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="nome_mae" class="form-label required">Nome da Mãe</label>
              <input type="text" class="form-control" id="nome_mae" required>
            </div>
            <div class="col-md-3 mb-3">
              <label for="contato_mae" class="form-label required">Contato da Mãe</label>
              <input type="text" class="form-control" id="contato_mae" required placeholder="Telefone / WhatsApp">
            </div>
            <div class="col-md-3 mb-3">
              <label for="cpf_mae" class="form-label">CPF da Mãe</label>
              <input type="text" class="form-control" id="cpf_mae" placeholder="000.000.000-00">
            </div>
          </div>
        </div>
      </div>

      <!-- Saúde -->
      <div class="card form-card mb-4">
        <div class="card-header">Saúde</div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-12 mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="alergia_intolerancia">
                <label class="form-check-label" for="alergia_intolerancia">Possui alergia ou intolerância?</label>
              </div>
            </div>
            <div class="col-md-12 mb-3">
              <label for="descricao_alergia" class="form-label">Descrição da alergia</label>
              <textarea class="form-control" id="descricao_alergia" rows="2"></textarea>
            </div>
            <div class="col-md-6 mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="usa_medicamento">
                <label class="form-check-label" for="usa_medicamento">Usa medicamento contínuo?</label>
              </div>
            </div>
            <div class="col-md-6 mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="necessita_atencao_medicamento">
                <label class="form-check-label" for="necessita_atencao_medicamento">Necessita atenção especial para medicamento?</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Autorizações -->
      <div class="card form-card mb-4">
        <div class="card-header">Autorizações</div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-4 mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="autorizacao_fotos_redes">
                <label class="form-check-label" for="autorizacao_fotos_redes">Autoriza fotos e redes sociais?</label>
              </div>
            </div>
            <div class="col-md-4 mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="autorizacao_passeios">
                <label class="form-check-label" for="autorizacao_passeios">Autoriza passeios externos?</label>
              </div>
            </div>
            <div class="col-md-4 mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="aniversario_escola">
                <label class="form-check-label" for="aniversario_escola">Brincar na areia</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Emergência -->
      <div class="card form-card mb-4">
        <div class="card-header">Contato de Emergência</div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="contato_emergencia_nome" class="form-label required">Nome do Contato</label>
              <input type="text" class="form-control" id="contato_emergencia_nome" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="contato_emergencia_telefone" class="form-label required">Telefone de Emergência</label>
              <input type="text" class="form-control" id="contato_emergencia_telefone" required placeholder="Telefone / WhatsApp">
            </div>
          </div>
        </div>
      </div>

      <!-- Outros -->
      <div class="card form-card mb-4">
        <div class="card-header">Outras Informações</div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-12 mb-3">
              <label for="responsaveis_retirada" class="form-label">Responsáveis autorizados para retirada</label>
              <textarea class="form-control" id="responsaveis_retirada" rows="2" placeholder="Nome das pessoas autorizadas a retirar o aluno"></textarea>
            </div>
            <div class="col-md-12 mb-3">
              <label for="observacoes" class="form-label">Observações</label>
              <textarea class="form-control" id="observacoes" rows="3"></textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- Honeypot anti-bot -->
      <div class="honey">
        <label for="website">Não preencher</label>
        <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
      </div>

      <!-- Termo -->
      <div class="card form-card mb-4">
        <div class="card-body">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="termo" required>
            <label class="form-check-label required" for="termo">
              Declaro que as informações prestadas são verdadeiras e autorizo o tratamento dos dados para fins de matrícula.
            </label>
            <div class="invalid-feedback">Você precisa aceitar o termo.</div>
          </div>
        </div>
      </div>

      <!-- Submit -->
      <div class="submit-section mb-4">
        <div id="alertArea"></div>
        <button type="submit" class="btn btn-warning btn-lg px-5" id="submitBtn">
          <span id="submitText">Enviar Cadastro</span>
          <span id="submitSpinner" class="spinner-border spinner-border-sm d-none"></span>
        </button>
        <p class="text-muted mt-2 mb-0 small">Após o envio, entraremos em contato para confirmar a matrícula.</p>
      </div>

    </form>
    <div class="footer-text">
      Escolinha Girassol &mdash; Educação Infantil
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/ficha-cadastral.js"></script>
</body>
</html>
