<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Aluno – Sistema Escolar</title>
  <!-- Bootstrap 5.3 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-warning mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Sistema Escolar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="d-flex ms-auto" id="navbarLinks"></div>
      </div>
    </div>
  </nav>

  <div class="container">
    <h2 id="pageTitle" class="mb-4">Novo Aluno</h2>
    <form id="alunoForm">
      <!-- Informações Básicas -->
      <div class="card mb-4">
        <div class="card-header">
          <h4>Informações Básicas</h4>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="nome" class="form-label">Nome Completo</label>
              <input type="text" class="form-control" id="nome" required />
            </div>
            <div class="col-md-3 mb-3">
              <label for="data_nascimento" class="form-label">Data de Nascimento</label>
              <input type="date" class="form-control" id="data_nascimento" />
            </div>
            <div class="col-md-3 mb-3">
              <label for="genero" class="form-label">Gênero</label>
              <select class="form-select" id="genero">
                <option value="">Selecione...</option>
                <option value="Masculino">Masculino</option>
                <option value="Feminino">Feminino</option>
                <option value="Outro">Outro</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="cpf_aluno" class="form-label">CPF do Aluno</label>
              <input type="text" class="form-control" id="cpf_aluno" placeholder="000.000.000-00">
            </div>
            <div class="col-md-4 mb-3">
              <label for="turma" class="form-label">Turma</label>
              <input type="text" class="form-control" id="turma" />
            </div>
            <div class="col-md-4 mb-3">
              <label for="turno" class="form-label">Turno</label>
              <select class="form-select" id="turno">
                <option value="">Selecione...</option>
                <option value="Manhã">Manhã</option>
                <option value="Tarde">Tarde</option>
                <option value="Integral">Integral</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="email_aluno" class="form-label">E-mail do Aluno</label>
              <input type="email" class="form-control" id="email_aluno" placeholder="aluno@exemplo.com">
            </div>
          </div>
        </div>
      </div>

      <!-- Endereço -->
      <div class="card mb-4">
        <div class="card-header">
          <h4>Endereço</h4>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="endereco_rua" class="form-label">Rua</label>
              <input type="text" class="form-control" id="endereco_rua" />
            </div>
            <div class="col-md-3 mb-3">
              <label for="endereco_bairro" class="form-label">Bairro</label>
              <input type="text" class="form-control" id="endereco_bairro" />
            </div>
            <div class="col-md-3 mb-3">
              <label for="endereco_cidade" class="form-label">Cidade</label>
              <input type="text" class="form-control" id="endereco_cidade" />
            </div>
          </div>
        </div>
      </div>

      <!-- Responsáveis -->
      <div class="card mb-4">
        <div class="card-header">
          <h4>Responsáveis</h4>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="nome_pai" class="form-label">Nome do Pai</label>
              <input type="text" class="form-control" id="nome_pai" />
            </div>
            <div class="col-md-4 mb-3">
              <label for="contato_pai" class="form-label">Contato do Pai</label>
              <input type="text" class="form-control" id="contato_pai" />
            </div>
            <div class="col-md-4 mb-3">
              <label for="cpf_pai" class="form-label">CPF do Pai</label>
              <input type="text" class="form-control" id="cpf_pai" placeholder="000.000.000-00">
            </div>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="nome_mae" class="form-label">Nome da Mãe</label>
              <input type="text" class="form-control" id="nome_mae" />
            </div>
            <div class="col-md-4 mb-3">
              <label for="contato_mae" class="form-label">Contato da Mãe</label>
              <input type="text" class="form-control" id="contato_mae" />
            </div>
            <div class="col-md-4 mb-3">
              <label for="cpf_mae" class="form-label">CPF da Mãe</label>
              <input type="text" class="form-control" id="cpf_mae" placeholder="000.000.000-00">
            </div>
          </div>
        </div>
      </div>
      
      <!-- Saúde -->
      <div class="card mb-4">
          <div class="card-header"><h4>Saúde</h4></div>
          <div class="card-body">
              <div class="row">
                  <div class="col-md-12 mb-3">
                      <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="alergia_intolerancia">
                          <label class="form-check-label" for="alergia_intolerancia">Possui alergia/intolerância?</label>
                      </div>
                  </div>
                  <div class="col-md-12 mb-3">
                      <label for="descricao_alergia" class="form-label">Descrição da alergia</label>
                      <textarea class="form-control" id="descricao_alergia" rows="2"></textarea>
                  </div>
                   <div class="col-md-6 mb-3">
                      <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="usa_medicamento">
                          <label class="form-check-label" for="usa_medicamento">Usa medicamento?</label>
                      </div>
                  </div>
                  <div class="col-md-6 mb-3">
                      <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="necessita_atencao_medicamento">
                          <label class="form-check-label" for="necessita_atencao_medicamento">Necessita atenção para medicamento?</label>
                      </div>
                  </div>
              </div>
          </div>
      </div>
      
      <!-- Autorizações -->
       <div class="card mb-4">
          <div class="card-header"><h4>Autorizações</h4></div>
          <div class="card-body">
              <div class="row">
                  <div class="col-md-4 mb-3">
                       <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="autorizacao_fotos_redes">
                          <label class="form-check-label" for="autorizacao_fotos_redes">Autoriza fotos e redes sociais?</label>
                      </div>
                  </div>
                  <div class="col-md-4 mb-3">
                      <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="autorizacao_passeios">
                          <label class="form-check-label" for="autorizacao_passeios">Autoriza passeios?</label>
                      </div>
                  </div>
                  <div class="col-md-4 mb-3">
                       <div class="form-check">
                           <input class="form-check-input" type="checkbox" id="pode_brincar_areia">
                           <label class="form-check-label" for="pode_brincar_areia">Pode brincar na areia?</label>
                       </div>
                  </div>
              </div>
              <div class="row">
                  <div class="col-md-4 mb-3">
                       <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="aniversario_escola">
                          <label class="form-check-label" for="aniversario_escola">Aniversário na escola?</label>
                      </div>
                  </div>
              </div>
          </div>
      </div>
      
      <!-- Emergência -->
      <div class="card mb-4">
          <div class="card-header"><h4>Emergência</h4></div>
          <div class="card-body">
              <div class="row">
                  <div class="col-md-6 mb-3">
                      <label for="contato_emergencia_nome" class="form-label">Nome do Contato</label>
                      <input type="text" class="form-control" id="contato_emergencia_nome">
                  </div>
                  <div class="col-md-6 mb-3">
                      <label for="contato_emergencia_telefone" class="form-label">Telefone de Emergência</label>
                      <input type="text" class="form-control" id="contato_emergencia_telefone">
                  </div>
              </div>
          </div>
      </div>
      
      <!-- Outros -->
       <div class="card mb-4">
          <div class="card-header"><h4>Outros</h4></div>
          <div class="card-body">
              <div class="row">
                  <div class="col-md-12 mb-3">
                      <label for="responsaveis_retirada" class="form-label">Responsáveis autorizados para retirada</label>
                      <textarea class="form-control" id="responsaveis_retirada" rows="2"></textarea>
                  </div>
                    <div class="col-md-12 mb-3">
                     <label for="foto" class="form-label">Foto</label>
                     <input type="file" class="form-control" id="foto" accept="image/jpeg,image/png,image/webp" capture="environment">
                   </div>
                   <div class="col-md-12 mb-3">
                     <label for="foto_documento" class="form-label">Foto do Documento (RG/CPF)</label>
                     <input type="file" class="form-control" id="foto_documento" accept="image/jpeg,image/png,image/webp" capture="environment">
                   </div>
                  <div class="col-md-12 mb-3">
                     <label for="observacoes_aniversario_escola" class="form-label">Observações sobre aniversário na escola</label>
                     <textarea class="form-control" id="observacoes_aniversario_escola" rows="2"></textarea>
                  </div>
                  <div class="col-md-12 mb-3">
                     <label for="observacoes" class="form-label">Observações</label>
                     <textarea class="form-control" id="observacoes" rows="3"></textarea>
                  </div>
              </div>
          </div>
      </div>


      <div class="d-flex justify-content-end mb-4">
        <button type="button" class="btn btn-secondary me-2" id="cancelBtn">Cancelar</button>
        <button type="submit" class="btn btn-warning">Salvar</button>
      </div>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/aluno.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+4l5Y5nq6Q5Z4c+5B4E1hK7J/2R7" crossorigin="anonymous"></script>
</body>
</html>
