<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Escolinha Girassol</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    .logo-svg { width: 36px; height: 36px; margin-right: 10px; }
    .stat-card { transition: transform .2s; cursor: default; }
    .stat-card:hover { transform: translateY(-4px); }
    .stat-icon { font-size: 2rem; opacity: .5; }
    .card-value { font-size: 2.2rem; font-weight: 700; line-height: 1.2; }
    .card-label { font-size: .85rem; text-transform: uppercase; letter-spacing: .5px; opacity: .75; }
    .birthday-card { min-width: 200px; }
    .birthday-card .card-text { font-size: .9rem; }
    .no-birthday { color: #6c757d; font-style: italic; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-warning mb-4">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="./images/Gira.jpg" alt="Logo" class="logo-svg" style="width:36px;height:36px;margin-right:10px;" />
        Escolinha Girassol
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="d-flex ms-auto" id="navbarLinks"></div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row g-3 mb-4" id="statCards">
      <div class="col-6 col-md-3">
        <div class="card stat-card border-0 shadow-sm h-100">
          <div class="card-body text-center">
            <div class="stat-icon mb-1">👩‍🎓</div>
            <div class="card-value" id="totalAlunos">0</div>
            <div class="card-label">Total de Alunos</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card border-0 shadow-sm h-100">
          <div class="card-body text-center">
            <div class="stat-icon mb-1">📚</div>
            <div class="card-value" id="totalTurmas">0</div>
            <div class="card-label">Total de Turmas</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card border-0 shadow-sm h-100">
          <div class="card-body text-center">
            <div class="stat-icon mb-1">🌅</div>
            <div class="card-value" id="totalMatutino">0</div>
            <div class="card-label">Matutino</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card border-0 shadow-sm h-100">
          <div class="card-body text-center">
            <div class="stat-icon mb-1">🌆</div>
            <div class="card-value" id="totalVespertino">0</div>
            <div class="card-label">Vespertino</div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">Alunos por Turma</h5>
            <canvas id="turmaChart" height="200"></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">Alunos por Turno</h5>
            <canvas id="turnoChart" height="200"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <h5 class="card-title">🎂 Aniversariantes do Mês</h5>
        <div id="birthdayList" class="d-flex flex-wrap gap-2 mt-3"></div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
