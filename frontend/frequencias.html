<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chamada – Sistema Escolar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-warning mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Sistema Escolar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="d-flex ms-auto" id="navbarLinks"></div>
      </div>
    </div>
  </nav>

  <div class="container">
    <h2 class="mb-3">Chamada em Sala</h2>

    <div class="card mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label">Turma *</label>
            <select id="turmaSelect" class="form-select" required>
              <option value="">Selecione</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Data *</label>
            <input type="date" id="dataInput" class="form-control" required />
          </div>
          <div class="col-md-3">
            <button id="carregarBtn" class="btn btn-warning w-100">Carregar Chamada</button>
          </div>
          <div class="col-md-2">
            <button id="salvarBtn" class="btn btn-warning w-100" disabled>Salvar</button>
          </div>
        </div>
      </div>
    </div>

    <div id="chamadaContainer" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h5 class="mb-0">
          Alunos - <span id="turmaNomeDisplay"></span>
          <small class="text-muted ms-2" id="dataDisplay"></small>
        </h5>
        <span id="contadorPresenca" class="badge bg-info fs-6"></span>
      </div>

      <div class="table-responsive">
        <table class="table table-striped">
          <thead class="table-light">
            <tr>
              <th style="width:50px">#</th>
              <th>Nome</th>
              <th style="width:120px">Presente</th>
            </tr>
          </thead>
          <tbody id="alunosTbody"></tbody>
        </table>
      </div>

      <div id="historicoContainer" class="mt-4">
        <h6>Histórico de chamadas desta turma</h6>
        <div id="historicoLista" class="d-flex flex-wrap gap-2"></div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/frequencias.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
