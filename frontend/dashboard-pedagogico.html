<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Pedagógico – Sistema Escolar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    .stat-card { transition: transform .2s; }
    .stat-card:hover { transform: translateY(-3px); }
    .card-value { font-size: 2rem; font-weight: 700; }
    .card-label { font-size: .8rem; text-transform: uppercase; letter-spacing: .5px; opacity: .75; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-warning mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Sistema Escolar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="d-flex ms-auto" id="navbarLinks"></div>
      </div>
    </div>
  </nav>

  <div class="container">
    <h2 class="mb-3">Dashboard Pedagógico</h2>

    <!-- Cards estáticos -->
    <div class="row g-3 mb-4" id="statCards">
      <div class="col-6 col-md-3">
        <div class="card stat-card border-0 shadow-sm h-100 text-bg-warning">
          <div class="card-body text-center">
            <div class="card-value" id="presencaGeral">0%</div>
            <div class="card-label">Presença Geral</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card border-0 shadow-sm h-100 text-bg-success">
          <div class="card-body text-center">
            <div class="card-value" id="totalPresentes">0</div>
            <div class="card-label">Total Presentes</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card border-0 shadow-sm h-100 text-bg-warning">
          <div class="card-body text-center">
            <div class="card-value" id="totalFaltas">0</div>
            <div class="card-label">Total Faltas</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card border-0 shadow-sm h-100 text-bg-info">
          <div class="card-body text-center">
            <div class="card-value" id="totalRegistrosPresenca">0</div>
            <div class="card-label">Registros</div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="card stat-card border-0 shadow-sm h-100 text-bg-secondary">
          <div class="card-body text-center">
            <div class="card-value" id="diarioTotalAulas">0</div>
            <div class="card-label">Aulas no Diário</div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card stat-card border-0 shadow-sm h-100 text-bg-secondary">
          <div class="card-body text-center">
            <div class="card-value" id="diarioDias">0</div>
            <div class="card-label">Dias Letivos</div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card stat-card border-0 shadow-sm h-100 text-bg-secondary">
          <div class="card-body text-center">
            <div class="card-value" id="diarioTurmas">0</div>
            <div class="card-label">Turmas no Diário</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Gráficos -->
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">Presença por Turma</h5>
            <canvas id="presencaTurmaChart" height="220"></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">Evolução Semanal</h5>
            <canvas id="evolucaoChart" height="220"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Top 5 menor presença + Professoras ativas -->
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">Turmas com Menor Presença</h5>
            <div id="menorPresencaLista" class="mt-2"></div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">Professoras Mais Ativas</h5>
            <div id="ativasLista" class="mt-2"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/dashboard-pedagogico.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
