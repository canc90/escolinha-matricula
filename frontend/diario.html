<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diário de Classe – Sistema Escolar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-warning mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Sistema Escolar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="d-flex ms-auto" id="navbarLinks"></div>
      </div>
    </div>
  </nav>

  <div class="container">
    <h2 class="mb-3">Diário de Classe</h2>

    <div class="card mb-4">
      <div class="card-body">
        <form id="diarioForm">
          <div class="row mb-3">
            <div class="col-md-4">
              <label class="form-label">Turma *</label>
              <select id="turmaSelect" class="form-select" required>
                <option value="">Selecione</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Data *</label>
              <input type="date" id="dataInput" class="form-control" required />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Conteúdo da Aula</label>
            <textarea id="conteudoInput" class="form-control" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Observações</label>
            <textarea id="observacoesInput" class="form-control" rows="2"></textarea>
          </div>
          <input type="hidden" id="diarioId" />
          <button type="submit" class="btn btn-warning" id="saveDiarioBtn">Salvar</button>
          <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display:none" data-bs-dismiss="modal">Cancelar</button>
        </form>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-4">
        <select id="filterTurma" class="form-select">
          <option value="">Todas as turmas</option>
        </select>
      </div>
      <div class="col-md-3">
        <input type="date" id="filterData" class="form-control" />
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-striped">
        <thead class="table-light">
          <tr>
            <th>Data</th>
            <th>Turma</th>
            <th>Conteúdo</th>
            <th>Observações</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="diarioTbody"></tbody>
      </table>
    </div>
    <nav><ul class="pagination" id="pagination"></ul></nav>

    <hr>
    <div class="card">
      <div class="card-header" data-bs-toggle="collapse" data-bs-target="#importCsvDiario" style="cursor:pointer">
        <strong>Importar Diário via CSV</strong>
      </div>
      <div class="collapse" id="importCsvDiario">
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-md-6">
              <input type="file" id="csvFileInput" class="form-control" accept=".csv" />
            </div>
            <div class="col-md-3">
              <button id="importCsvBtn" class="btn btn-warning w-100">Importar</button>
            </div>
          </div>
          <div id="importResult" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/diario.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
