<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Educacional – Sistema Escolar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .risk-critical { background: #dc3545; color: #fff; }
    .risk-high { background: #fd7e14; color: #fff; }
    .risk-medium { background: #ffc107; color: #333; }
    .risk-low { background: #198754; color: #fff; }
    .risk-badge { font-size: .75rem; padding: .2em .6em; border-radius: 10px; font-weight: 600; }
    .factor-item { font-size: .85rem; border-left: 3px solid #ffc107; padding-left: .5rem; margin-bottom: .25rem; }
    .alerta-card { border-left: 4px solid #dc3545; }
    .alerta-card.resolved { border-left-color: #198754; opacity: .7; }
    .explanation-box { background: #f8f9fa; border-radius: 6px; padding: .75rem; font-size: .85rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-warning mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Sistema Escolar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="d-flex ms-auto" id="navbarLinks"></div>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h2 class="mb-0">IA Educacional — Risco de Evasão</h2>
      <div>
        <button id="btnGerarAlertas" class="btn btn-outline-danger btn-sm me-2">Gerar Alertas</button>
        <select id="filtroTurma" class="form-select form-select-sm d-inline-block w-auto">
          <option value="">Todas as Turmas</option>
        </select>
      </div>
    </div>

    <!-- Cards resumo -->
    <div class="row g-2 mb-4" id="summaryCards">
      <div class="col-6 col-md">
        <div class="card border-0 shadow-sm text-center p-2">
          <div class="fs-3 fw-bold" id="totalAlunos">0</div>
          <small class="text-muted">Total</small>
        </div>
      </div>
      <div class="col-6 col-md">
        <div class="card border-0 shadow-sm text-center p-2 bg-danger text-white">
          <div class="fs-3 fw-bold" id="totalCritical">0</div>
          <small>Crítico</small>
        </div>
      </div>
      <div class="col-6 col-md">
        <div class="card border-0 shadow-sm text-center p-2 bg-warning text-dark">
          <div class="fs-3 fw-bold" id="totalHigh">0</div>
          <small>Alto</small>
        </div>
      </div>
      <div class="col-6 col-md">
        <div class="card border-0 shadow-sm text-center p-2 bg-info text-dark">
          <div class="fs-3 fw-bold" id="totalMedium">0</div>
          <small>Médio</small>
        </div>
      </div>
      <div class="col-6 col-md">
        <div class="card border-0 shadow-sm text-center p-2 bg-success text-white">
          <div class="fs-3 fw-bold" id="totalLow">0</div>
          <small>Baixo</small>
        </div>
      </div>
    </div>

    <!-- Ranking + Alertas -->
    <div class="row g-3 mb-4">
      <div class="col-md-8">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-transparent d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Ranking de Risco</h5>
            <small class="text-muted" id="mediaRisco"></small>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover table-sm mb-0" id="rankingTable">
                <thead class="table-light">
                  <tr><th>#</th><th>Aluno</th><th>Turma</th><th>Score</th><th>Risco</th><th>Tendência</th><th></th></tr>
                </thead>
                <tbody id="rankingBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-transparent">
            <h5 class="mb-0">Alertas Ativos</h5>
          </div>
          <div class="card-body p-0" id="alertasList">
            <div class="text-center text-muted py-4">Nenhum alerta.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Detalhes do aluno selecionado -->
    <div class="card border-0 shadow-sm mb-4 d-none" id="detalhesCard">
      <div class="card-header bg-transparent d-flex justify-content-between align-items-center">
        <h5 class="mb-0" id="detalhesNome">Detalhes do Aluno</h5>
        <button class="btn btn-sm btn-outline-secondary" id="fecharDetalhesBtn">×</button>
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <h6>Fatores de Risco</h6>
            <div id="detalhesFatores" class="mb-3"></div>
            <h6>Explanation</h6>
            <div id="detalhesExplanation" class="explanation-box"></div>
          </div>
          <div class="col-md-6">
            <h6>Estatísticas</h6>
            <div id="detalhesEstatisticas" class="mb-3"></div>
            <h6>Recomendações</h6>
            <div id="detalhesRecomendacoes"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/ia-educacional.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
