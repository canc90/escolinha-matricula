<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turmas – Sistema Escolar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-warning mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Sistema Escolar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="d-flex ms-auto" id="navbarLinks"></div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Turmas</h2>
      <button id="novaTurmaBtn" class="btn btn-warning">Nova Turma</button>
    </div>

    <div class="row mb-3">
      <div class="col-md-4">
        <input type="text" id="searchInput" class="form-control" placeholder="Buscar por nome da turma" />
      </div>
      <div class="col-md-3">
        <select id="turnoFilter" class="form-select">
          <option value="">Todos os turnos</option>
          <option value="matutino">Matutino</option>
          <option value="vespertino">Vespertino</option>
          <option value="integral">Integral</option>
        </select>
      </div>
      <div class="col-md-3">
        <input type="text" id="anoFilter" class="form-control" placeholder="Ano letivo (ex: 2026)" />
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-striped">
        <thead class="table-light">
          <tr>
            <th>Nome</th>
            <th>Turno</th>
            <th>Ano Letivo</th>
            <th>Professoras</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="turmasTbody"></tbody>
      </table>
    </div>

    <nav><ul class="pagination" id="pagination"></ul></nav>

    <hr>
    <div class="card">
      <div class="card-header" data-bs-toggle="collapse" data-bs-target="#importCsvTurmas" style="cursor:pointer">
        <strong>Importar Turmas via CSV</strong>
      </div>
      <div class="collapse" id="importCsvTurmas">
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-md-6">
              <input type="file" id="csvFileInput" class="form-control" accept=".csv" />
            </div>
            <div class="col-md-3">
              <button id="importCsvBtn" class="btn btn-warning w-100">Importar</button>
            </div>
          </div>
          <div id="importResult" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Turma -->
  <div class="modal fade" id="turmaModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="turmaModalLabel">Nova Turma</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="turmaForm">
            <input type="hidden" id="turmaId" />
            <div class="mb-3">
              <label class="form-label">Nome *</label>
              <input type="text" id="nomeInput" class="form-control" required />
            </div>
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Turno</label>
                <select id="turnoInput" class="form-select">
                  <option value="">Selecione</option>
                  <option value="matutino">Matutino</option>
                  <option value="vespertino">Vespertino</option>
                  <option value="integral">Integral</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Ano Letivo</label>
                <input type="text" id="anoInput" class="form-control" placeholder="2026" />
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-warning" id="saveTurmaBtn">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Vínculo Professoras -->
  <div class="modal fade" id="vinculoModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Vincular Professoras</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="vinculoTurmaInfo" class="mb-3 fw-bold"></div>
          <div class="mb-3">
            <select id="vinculoProfessoraSelect" class="form-select">
              <option value="">Selecione uma professora</option>
            </select>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="vinculoPrincipal">
            <label class="form-check-label">Professora principal</label>
          </div>
          <button id="vincularBtn" class="btn btn-warning btn-sm">Vincular</button>
          <hr />
          <h6>Professoras vinculadas</h6>
          <ul id="vinculoLista" class="list-group"></ul>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Visualizar -->
  <div class="modal fade" id="viewTurmaModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Dados da Turma</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="viewTurmaBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Confirmar Exclusão -->
  <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Confirmar exclusão</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">Deseja realmente excluir esta turma?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/turmas.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
