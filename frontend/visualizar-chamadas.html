<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório de Chamadas – Sistema Escolar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-warning mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Sistema Escolar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="d-flex ms-auto" id="navbarLinks"></div>
      </div>
    </div>
  </nav>

  <div class="container">
    <h2 class="mb-3">Relatório de Frequência</h2>

    <div class="row mb-3">
      <div class="col-md-4">
        <label class="form-label">Turma</label>
        <select id="turmaSelect" class="form-select">
          <option value="">Selecione</option>
        </select>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button id="carregarBtn" class="btn btn-warning w-100">Carregar</button>
      </div>
    </div>

    <div id="relatorioContainer" class="d-none">
      <div class="row g-3 mb-4">
        <div class="col-md-3">
          <div class="card text-bg-warning"><div class="card-body text-center"><h3 id="totalAulas">0</h3><div>Total de Aulas</div></div></div>
        </div>
        <div class="col-md-3">
          <div class="card text-bg-success"><div class="card-body text-center"><h3 id="totalAlunos">0</h3><div>Total de Alunos</div></div></div>
        </div>
        <div class="col-md-3">
          <div class="card text-bg-info"><div class="card-body text-center"><h3 id="mediaPresenca">0%</h3><div>Média de Presença</div></div></div>
        </div>
        <div class="col-md-3">
          <div class="card text-bg-warning"><div class="card-body text-center"><h3 id="menorPresenca">-</h3><div>Menor Frequência</div></div></div>
        </div>
      </div>

      <div id="legendaDatas" class="mb-2 small text-muted"></div>

      <div class="table-responsive">
        <table class="table table-sm table-bordered align-middle">
          <thead class="table-light">
            <tr id="relatorioHeader">
              <th style="min-width:200px">Aluno</th>
              <th style="width:90px">%</th>
              <th style="width:80px">P</th>
              <th style="width:80px">F</th>
            </tr>
          </thead>
          <tbody id="relatorioTbody"></tbody>
        </table>
      </div>
    </div>

    <div id="semDados" class="alert alert-info d-none">Nenhuma chamada encontrada para esta turma.</div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/visualizar-chamadas.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
